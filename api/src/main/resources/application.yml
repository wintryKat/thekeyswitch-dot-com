spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/thekeyswitch}
    username: ${SPRING_DATASOURCE_USERNAME:thekeyswitch}
    password: ${SPRING_DATASOURCE_PASSWORD:thekeyswitch}
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  graphql:
    graphiql:
      enabled: true
    websocket:
      path: /graphql

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production}
  expiration-ms: 86400000
