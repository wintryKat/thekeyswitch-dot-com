<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="housingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#581c87"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="40%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="crescentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <!-- Mask for crescent shape -->
    <mask id="crescentMask">
      <rect width="512" height="512" fill="white"/>
      <circle cx="306" cy="68" r="22" fill="black"/>
    </mask>
  </defs>

  <!-- Switch housing body -->
  <rect x="106" y="240" width="300" height="200" rx="28" fill="url(#housingGrad)"/>

  <!-- Housing top plate (lighter, the part you see from above) -->
  <rect x="126" y="250" width="260" height="40" rx="12" fill="#8b5cf6" opacity="0.4"/>

  <!-- Housing detail grooves -->
  <rect x="146" y="352" width="220" height="8" rx="4" fill="#4c1d95" opacity="0.5"/>
  <rect x="166" y="376" width="180" height="6" rx="3" fill="#4c1d95" opacity="0.3"/>

  <!-- Contact pins emerging from bottom -->
  <rect x="196" y="440" width="14" height="36" rx="7" fill="#d4a574"/>
  <rect x="249" y="440" width="14" height="44" rx="7" fill="#d4a574"/>
  <rect x="302" y="440" width="14" height="36" rx="7" fill="#d4a574"/>

  <!-- Switch stem — tapers upward into a pointed hat silhouette -->
  <path d="
    M 220 258
    L 220 180
    Q 220 140 256 56
    Q 292 140 292 180
    L 292 258
    Z
  " fill="url(#stemGrad)"/>

  <!-- Cherry MX cross on the stem -->
  <rect x="248" y="168" width="16" height="52" rx="2.5" fill="#7c3aed"/>
  <rect x="233" y="184" width="46" height="16" rx="2.5" fill="#7c3aed"/>

  <!-- Crescent moon using mask — works on any background -->
  <circle cx="294" cy="76" r="26" fill="url(#crescentGrad)" mask="url(#crescentMask)"/>

  <!-- Star accents -->
  <!-- 4-point star -->
  <path d="M 332 56 L 334 50 L 336 56 L 342 58 L 336 60 L 334 66 L 332 60 L 326 58 Z" fill="#f5deb3" opacity="0.9"/>
  <!-- Small dots -->
  <circle cx="348" cy="40" r="2.5" fill="#d4a574" opacity="0.7"/>
  <circle cx="354" cy="72" r="2" fill="#d4a574" opacity="0.6"/>
  <circle cx="318" cy="38" r="1.8" fill="#f5deb3" opacity="0.5"/>
</svg>
