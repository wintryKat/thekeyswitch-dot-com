<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="keycapTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="keycapSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5deb3"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <linearGradient id="springGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="housingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#581c87"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
  </defs>

  <!-- Switch housing (bottom body) -->
  <rect x="126" y="340" width="260" height="100" rx="20" fill="url(#housingGrad)"/>
  <!-- Housing inner detail line -->
  <rect x="156" y="380" width="200" height="6" rx="3" fill="#4c1d95" opacity="0.6"/>

  <!-- Two contact leaves (gold, inside housing) -->
  <path d="M 200 340 L 200 310 Q 200 300 210 300 L 230 300 Q 240 300 240 310 L 240 340" fill="none" stroke="#d4a574" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <path d="M 272 340 L 272 310 Q 272 300 282 300 L 302 300 Q 312 300 312 310 L 312 340" fill="none" stroke="#d4a574" stroke-width="6" stroke-linecap="round" opacity="0.7"/>

  <!-- Spring (gold coils) -->
  <g fill="none" stroke="url(#springGrad)" stroke-width="7" stroke-linecap="round">
    <path d="M 222 330 Q 256 318 290 330"/>
    <path d="M 226 314 Q 256 302 286 314"/>
    <path d="M 230 298 Q 256 286 282 298"/>
    <path d="M 234 282 Q 256 270 278 282"/>
  </g>

  <!-- Stem (gold, rising up from spring) -->
  <rect x="240" y="168" width="32" height="100" rx="6" fill="url(#stemGrad)"/>

  <!-- Keycap side (darker, gives 3D depth) -->
  <path d="
    M 148 200
    L 148 168
    Q 148 140 176 140
    L 336 140
    Q 364 140 364 168
    L 364 200
    Q 364 212 348 212
    L 164 212
    Q 148 212 148 200
    Z
  " fill="url(#keycapSide)"/>

  <!-- Keycap top face (lighter, slightly inset for 3D) -->
  <rect x="160" y="100" width="192" height="52" rx="14" fill="url(#keycapTop)"/>

  <!-- Keycap top surface highlight -->
  <rect x="174" y="108" width="164" height="8" rx="4" fill="#c4b5fd" opacity="0.35"/>

  <!-- Subtle "K" legend on keycap -->
  <g fill="#ede8f5" opacity="0.6">
    <rect x="236" y="112" width="6" height="30" rx="2"/>
    <path d="M 242 127 L 260 112" stroke="#ede8f5" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 242 127 L 258 142" stroke="#ede8f5" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  </g>
</svg>
